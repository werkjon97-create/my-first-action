name: GitHub Actions GUI RDP (Brave Edition)

on:
  workflow_dispatch:

jobs:
  desktop-environment:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Google Chrome Remote Desktop
        run: |
          sudo apt update
          wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo dpkg --install chrome-remote-desktop_current_amd64.deb || sudo apt-get install --fix-broken -y

      - name: Install Desktop Environment (XFCE4 Stable Fix)
        run: |
          sudo apt update || true
          sudo DEBIAN_FRONTEND=noninteractive apt install -y xfce4 xfce4-goodies
          echo "exec /etc/X11/Xsession /usr/bin/xfce4-session" > ~/.chrome-remote-desktop-session

      - name: Install Brave Browser (Fixed Path)
        run: |
          sudo apt install -y curl
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          # تصحيح المسار هنا إلى .d بدلاً من .p
          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main" | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt update || true
          sudo apt install -y brave-browser

      - name: Configure and Start Remote Desktop Host
        env:
          GOOGLE_CODE: ${{ secrets.CHROME_HEADLESS_CODE }}
        run: |
          # تأكيد تشغيل الكود السري عبر الـ bash مباشرة لتفادي خطأ 127
          bash -c "$GOOGLE_CODE --pin=123456"

      - name: Keep Server Alive (5 Hours Session)
        run: |
          echo "=========================================================="
          echo "🚀 السيرفر السحابي متصل بالواجهة الرسومية بنجاح واحترافية!"
          echo "🌐 يمكنك الدخول الآن عبر: https://remotedesktop.google.com/access"
          echo "🔑 رمز الـ PIN الخاص بك للدخول هو: 123456"
          echo "=========================================================="
          sleep 18000
